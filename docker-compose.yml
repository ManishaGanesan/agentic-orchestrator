version: '3.8'

services:
  web:
    build: .
    container_name: excel-to-sql-converter
    ports:
      - "8000:8000"
    volumes:
      # Mount uploads and outputs for persistence
      - ./web_app/uploads:/app/web_app/uploads
      - ./web_app/outputs:/app/web_app/outputs
      # Mount .env file if it exists
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: excel-to-sql-network
